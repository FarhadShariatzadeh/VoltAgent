services:
  # Single service: FastAPI + Celery worker + Celery beat (Render free tier)
  - type: web
    name: voltagent-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -e .
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
